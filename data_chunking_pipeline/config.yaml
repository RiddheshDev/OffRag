chunk_strategy: "hierarchical"  # Choose from: sentence_window, hierarchical, recursive
chunk_size: 512
chunk_overlap: 128

# Sentence Window Config
sentence_window_size: 3
window_metadata_key: "window"
original_text_metadata_key: "original_text"

# Hierarchical Config
hierarchical_chunk_sizes: [1024, 512, 128]

# Table extraction Config
table_preceding_context_lines: 5
table_succeeding_context_lines: 5

# Classification Config
ocr_threshold_chars_per_page: 100
table_density_threshold: 0.5  # Ratio of table pages to total pages to classify as Table-Heavy

##OCR
pdf_img_path : 'pdf_to_img'

# Weaviate & Embeddings Config
upload_to_weaviate: True
overwrite_collection: True
embedding_model_name: "BAAI/bge-base-en-v1.5"
weaviate_collection: "Documents"
weaviate_host: "localhost"
weaviate_port: 8080
weaviate_grpc_port: 50051

# Retrieval & Reranker Config
retrieval_limit_before_rerank: 35
rerank_top_k: 3
max_distance_threshold: 0.6
rerank_model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"

# Hybrid Search Config
hybrid_alpha: 0.5
min_hybrid_score: 0.05

# LLM Generation Config
llm_provider: "none" # Options: openai, local, none
openai_model_name: "gpt-4o-mini"
local_model_name: "microsoft/Phi-3-mini-4k-instruct"
local_device: "auto"

# MCP Fallback Config
mcp_fallback_enabled: true
mcp_fallback_threshold: 0.1
mcp_server_command: "npx"
mcp_server_args: ["-y", "@modelcontextprotocol/server-brave-search"]
mcp_brave_api_key: ""

# Chatbot Config
chat_history_limit: 5

# Multi-Tenancy & Hierarchy Config
tenant_id: "default_client" # The hard-isolation client shard identifier
department_id: "" # Optional sub-tenant department filter (e.g. hr, finance)